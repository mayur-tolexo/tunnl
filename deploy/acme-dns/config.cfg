# acme-dns configuration for tunnl on shoplit.in.
# Replace RELAY_PUBLIC_IP with the public IP of the host running acme-dns
# (the same VPS as the relay is fine). See README.md in this directory.

[general]
listen = "0.0.0.0:53"
protocol = "both"            # serve DNS over UDP and TCP
# The zone acme-dns is authoritative for. Delegated from shoplit.in via an NS
# record (see README). acme-dns hands out <uuid>.auth.shoplit.in subdomains.
domain = "auth.shoplit.in"
nsname = "auth.shoplit.in"
nsadmin = "admin.shoplit.in"
# Static records acme-dns answers for its own zone: the glue A record (so
# auth.shoplit.in resolves to this server) and the self-referential NS record.
records = [
    "auth.shoplit.in. A RELAY_PUBLIC_IP",
    "auth.shoplit.in. NS auth.shoplit.in.",
]
debug = false

[database]
engine = "sqlite3"
connection = "/var/lib/acme-dns/acme-dns.db"

[api]
ip = "0.0.0.0"               # inside the container; only 127.0.0.1:8081 is published to the host
port = "8081"
disable_registration = false # set to true after you have registered (see README) to lock it down
tls = "none"
corsorigins = ["*"]
use_header = false

[logconfig]
loglevel = "info"
logtype = "stdout"
logformat = "text"
